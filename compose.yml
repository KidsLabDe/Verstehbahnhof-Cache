services:
  webseite:
    build: ./webseite
    container_name: verstehbahnhof-cache
    restart: unless-stopped
    volumes:
      - state:/app/state
      - ./logs:/app/log
    environment:
      - STATE_DIR=/app/state
      - LOG_DIR=/app/log
      # Timeouts in Minuten. Zum Ändern einfach die Werte hier anpassen
      # und "docker compose up -d" neu aufrufen.
      - INACTIVITY_TIMEOUT_MIN=15   # VB: während des Spiels
      - ARRIVED_TIMEOUT_MIN=5       # VB: nach dem Finale (nächste Gruppe)
      # Augsburg Cache
      - AUG_NUM_STATIONS=3          # Anzahl Stationen (inkl. Finale)
      - AUG_INACTIVITY_TIMEOUT_MIN=15
      - AUG_ARRIVED_TIMEOUT_MIN=5
      # Täglicher Telegram-Report (23:55 Uhr)
      # Beide Werte in .env oder direkt hier eintragen:
      - TELEGRAM_BOT_TOKEN=         # Bot-Token von BotFather
      - TELEGRAM_CHAT_ID=           # Chat-ID oder Channel-ID (z.B. -1001234567890)
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # HTTPS Router
      - "traefik.http.routers.verstehbahnhof.rule=Host(`verstehbahnhof.kidslab.de`) && PathPrefix(`/`)"
      - "traefik.http.routers.verstehbahnhof.entryPoints=websecure"
      - "traefik.http.routers.verstehbahnhof.tls=true"
      - "traefik.http.routers.verstehbahnhof.tls.certresolver=myresolver"
      - "traefik.http.routers.verstehbahnhof.tls.domains[0].main=verstehbahnhof.kidslab.de"
      - "traefik.http.routers.verstehbahnhof.middlewares=verstehbahnhof-headers"
      - "traefik.http.middlewares.verstehbahnhof-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.verstehbahnhof-headers.headers.customrequestheaders.X-Forwarded-Host=verstehbahnhof.kidslab.de"
      - "traefik.http.services.verstehbahnhof.loadbalancer.server.port=5000"
      # HTTP Router mit Redirect auf HTTPS
      - "traefik.http.routers.verstehbahnhof-http.rule=Host(`verstehbahnhof.kidslab.de`)"
      - "traefik.http.routers.verstehbahnhof-http.entryPoints=web"
      - "traefik.http.routers.verstehbahnhof-http.middlewares=verstehbahnhof-redirect"
      - "traefik.http.middlewares.verstehbahnhof-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.verstehbahnhof-redirect.redirectscheme.permanent=true"
      # HTTP Router für /state (ohne Redirect – ESP8266 kann kein BearSSL)
      - "traefik.http.routers.verstehbahnhof-api.rule=Host(`verstehbahnhof.kidslab.de`) && Path(`/state`)"
      - "traefik.http.routers.verstehbahnhof-api.entryPoints=web"
      - "traefik.http.routers.verstehbahnhof-api.service=verstehbahnhof"
      # HTTP Router für /augsburg/state (ohne Redirect – ESP32 Augsburg-Firmware)
      - "traefik.http.routers.verstehbahnhof-aug-api.rule=Host(`verstehbahnhof.kidslab.de`) && Path(`/augsburg/state`)"
      - "traefik.http.routers.verstehbahnhof-aug-api.entryPoints=web"
      - "traefik.http.routers.verstehbahnhof-aug-api.service=verstehbahnhof"

volumes:
  state:

networks:
  proxy:
    external: true
